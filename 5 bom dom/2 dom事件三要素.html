<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="btn">按钮</div>
    
    <script>
        //事件三要素： 事件源 事件类型 事件处理程序
        var btn = document.getElementById('btn'); //事件源
        btn.onclick = function(){alert('123')} //onclick 是事件类型   function是处理程序
    </script>
</body>
</html>
