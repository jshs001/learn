<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // js是单线程 所有任务需要排队才能执行 
        // html5提出web worker标准 允许js创建多线程 
        // 于是js出现了同步和异步
        // 同步任务：代码执行顺序和任务创建顺序一致
        // 异步任务：代码执行顺序和任务创建顺序不一致
        console.log(1);
        setTimeout(function () {
            console.log(3);
        }, 1000)
        console.log(2);

        // js执行机制 
        // js把任务分为同步任务和异步任务
        // 同步任务 都在主线程上执行 形成一个执行栈
        // 异步任务是通过回调函数实现的，一般三种类型 1.定时器 2.ajax 3.事件监听 普通事件如click等 资源加载事件如load等 放到任务队列中执行
        // 执行时 先执行执行栈中的同步任务 遇到异步任务就放到任务队列中 一旦执行栈中的所有同步任务执行完毕，系统就会依次读取任务队列中的任务并执行
        // 异步进程 会在事件触发的时候把回调函数放到任务队列中 如果时定时任务会在定时任务时间触发的时候才会把回调函数放到任务队列中；总得来说任务队列中都是已触发的回调函数
        // 事件循环：执行栈执行完了就去任务队列看看有没有任务 有的话就放到执行栈中执行 循环此过程就是事件循环




    </script>
</body>
</html>
