<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .d1 {
            width: 100px;
            height: 100px;
            background-color: pink;
        }

        .fa,
        .fa1 {
            width: 200px;
            height: 200px;
            background-color: yellow;
            position: relative;
            text-align: center;
            line-height: 50px;
        }

        .son,
        .son1 {
            width: 100px;
            height: 100px;
            background-color: rgb(28, 149, 60);
            position: absolute;
            left: 50px;
            top: 50px;
            text-align: center;
            line-height: 100px;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <button class="btn1 b1">传统注册事件</button>
    <button class="btn2 b1">方法监听注册事件</button>
    <button class="btn3 b1">ie9以前的attachEvent</button>
    <div class="d1">1</div>
    <div class="d1">2</div>
    <div class="d1">3</div>
    <div class="fa">
        father
        <div class="son">son</div>
    </div>
    <div class="d2">事件对象</div>
    <ul class="u1">
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
    </ul>
    <a class="a1" href="http://www.baidu.com">百度</a>
    <form action="http://www.baidu.com">
        <input class="i1" type="submit" value="提交" name="sub"></input>
    </form>

    <div class="fa1">
        father1 阻止冒泡
        <div class="son1">son1阻止冒泡</div>
    </div>
    <ul class="u2">
        <li>li1</li>
        <li>li2</li>
        <li>li3</li>
        <li>li4</li>
        <li>li5</li>
    </ul>
    <script>
        // 1 传统方法注册事件
        //传统注册事件具有唯一性 同一个元素同一个事件只能有一个处理函数， 最后的设置会覆盖前面的
        console.log('1、传统方法注册事件');
        var btns = document.querySelectorAll('.b1');
        btns[0].onclick = function () {
            console.log('点击了按钮1');
        }
        btns[0].onclick = function () {
            console.log('传统的点击了按钮1');
        }

        //2 方法监听注册事件
        //方法监听注册事件 w3c标准 推荐方法 ie9以前不支持 可使用attachEvent()代替；会按照注册顺序依次执行函数
        console.log('2、方法监听注册事件');
        btns[1].addEventListener('click', function () { //事件类型不带on 是字符串 需要加引号
            console.log('点击了按钮2');
        })
        btns[1].addEventListener('click', function () {
            console.log('方法监听注册事件');
        })

        //3 ie9以前的attachEvent()方法
        console.log('3、ie9以前的attachEvent()方法');
        // btns[2].attachEvent('onclick', function () {   //事件类型带on 需要ie9以前才支持。 需要改浏览器设置
        //     console.log('点击了按钮3');
        // })
        // btns[2].attachEvent('onclick', function () {
        //     console.log('ie9以前的attachEvent()方法');
        // })

        // 封装兼容函数
        function addEvent(element, eventType, callback) {
            if (element.addEventListener) {
                element.addEventListener(eventType, callback, false);
            } else if (element.attachEvent) {
                element.attachEvent('on' + eventType, callback);
            } else {
                element['on' + eventType] = callback;
            }
        }

        // 4 删除事件
        console.log('4、删除事件');
        var divs = document.querySelectorAll('.d1');
        divs[0].onclick = function () {
            console.log('传统解绑事件');
            divs[0].onclick = null;  // 传统解绑事件
        }

        // divs[1].addEventListener('click', function () {
        //     console.log('方法解绑事件');
        //     divs[1].removeEventListener('click', arguments.callee); // 方法解绑事件
        // })
        divs[1].addEventListener('click', fn)
        function fn() {
            console.log('方法解绑事件');
            divs[1].removeEventListener('click', fn); // 方法解绑事件
        }

        // divs[2].attachEvent('onclick', fn1) 
        // function fn1(){
        //     console.log('ie9以前的attachEvent()方法解绑事件');
        //     divs[2].detachEvent('onclick', fn1); // ie9以前的attachEvent()方法解绑事件
        // }
        //兼容性写法
        function removeEvent(element, eventType, callback) {
            if (element.removeEventListener) {
                element.removeEventListener(eventType, callback, false);
            } else if (element.detachEvent) {
                element.detachEvent('on' + eventType, callback);
            } else {
                element['on' + eventType] = null;
            }
        }

        // 5 事件流：事件传播的过程 
        console.log('5、事件流：事件传播的过程 ');
        // 三个阶段 事件捕获-> 目标 -> 事件冒泡 捕获阶段是从大到小（document->html->body->元素）找到目标元素时是目标阶段 冒泡阶段是从小到大（元素->body->html->document）
        // 注意1 、js代码只能执行捕获或冒泡一种传播方式 2、onclike和attachEvent()方法只能得到冒泡阶段
        // 如果addEventListener()方法第三个参数为true时，事件处理程序会按照捕获阶段执行，为false时（默认）按照冒泡阶段执行
        var fa = document.querySelector('.fa');
        var son = document.querySelector('.son');
        // fa.addEventListener('click', function (e) {
        //     console.log('fa捕获阶段');
        // }, true)
        // son.addEventListener('click', function (e) {
        //     console.log('son捕获阶段');
        // },true)
        fa.addEventListener('click', function (e) {
            console.log('fa冒泡阶段');
        }, false)
        son.addEventListener('click', function (e) {
            console.log('son冒泡阶段');
        }, false)
        // 注意 我们实际开发中一般使用冒泡阶段。
        // 有些事件没有冒泡阶段，如onblur onfocus onmouseenter onmouseleave
        // 事件冒泡有时候会带来麻烦 有时候又会帮我们巧妙的做某些事情

        // 6 事件对象
        console.log('6 事件对象')
        var d2 = document.querySelector('.d2');
        // 监听函数的形参e 是事件对象；事件发生时系统会将事件对象传入监听函数的形参e；事件对象是一个对象，对象中有很多属性，属性的值是事件相关的信息
        // 这个事件对象我们自己可以命名 如 e event evt
        // d2.onclick = function(e){ //传统方式
        //     console.log(e)
        // }
        d2.addEventListener('click', function (e) { // 监听方式
            console.log(e.target); // 返回触发事件的元素
            console.log(this); // 返回绑定（注册）事件的元素
            console.log(e.currentTarget); // 获取绑定事件的元素 跟this一样 同样有兼容性问题 这里常用this所以不用此属性
            console.log(e.type); // 获取事件类型
            console.log(e.timeStamp); // 获取事件触发的时间
            console.log(e.clientX); // 获取鼠标点击的位置
            console.log(e.clientY); // 获取鼠标点击的位置
            console.log(e);
        })
        // 事件对象也有兼容性问题 ie678需要通过window.event获取  兼容性写法e = e || window.event;
        // d2.onclick = function(e){ //兼容写法
        //     e = e || window.event;
        //     console.log(e)
        // }

        // e.target 与 this 的区别: this指向的是注册事件的对象 e.target指向的是触发事件的对象
        var u1 = document.querySelector('.u1')
        u1.addEventListener('click', function (e) {
            console.log(e.target);
            console.log(this);
        })
        // e.target兼容性问题 ie8及以下
        // u1.onclick = function(e) { 
        //     e = e || window.event
        //     var e = e.target || e.srcElement
        //     console.log(e.target); 
        //     console.log(this); 
        // }

        // 7 阻止默认行为
        console.log('7 阻止默认行为')
        var a1 = document.querySelector('.a1')
        a1.addEventListener('click', function (e) {
            e.preventDefault();
        })

        // a1.onclick = function(e) { // 传统的注册方式
        //     // e.preventDefault(); 
        //     // // ie 678
        //     // e.returnValue; 
        //     return false;  //这样也行 且没有兼容性 特点是return false后的代码不执行了 而且只限于传统注册方式的函数
        //     alert(1); 
        // }

        // 8 阻止冒泡
        console.log('8 阻止冒泡')
        var fa1 = document.querySelector('.fa1');
        var son1 = document.querySelector('.son1');
        son1.addEventListener('click', function (e) {
            console.log('点击了son1');
            // e.stopPropagation(); //阻止冒泡 有兼容性
            // e.cancelBubble = true; //ie678
            // 兼容性方案
            if (e && e.stopPropagation) {
                e.stopPropagation();
            } else {
                window.event.cancelBubble = true;
            }
        })
        fa1.addEventListener('click', function (e) {
            console.log('点击了fa1');
            e.stopPropagation();
        })
        document.addEventListener('click', function (e) {
            console.log('点击了document');
        })

        // 9 事件委托
        // jquery中称之为事件委派，事件委托原理：通过事件冒泡，将事件绑定在父元素上，然后通过判断事件源，来处理事件。
        console.log('9 事件委托');
        var u2 = document.querySelector('.u2');
        u2.addEventListener('click', function (e) {
            // console.log(e.target)
            console.log(e.target.innerHTML);
            u2.querySelectorAll('li').forEach(function (item) {
                item.style.backgroundColor = 'white';
            })
            e.target.style.backgroundColor = 'orange';
            e.stopPropagation();
        })

        // 10 鼠标常用事件
        // 禁止右键菜单
        document.addEventListener('contextmenu', function (e) {
            e.preventDefault();
        })
        // 禁止选中文字
        document.addEventListener('selectstart', function (e) {
            e.preventDefault();
        })
        document.addEventListener('click', function (e) { //鼠标事件对象
            console.log(e.clientX, e.clientY); //相对于浏览器窗口的坐标
            console.log(e.pageX, e.pageY); //相对于整个页面的坐标
            console.log(e.screenX, e.screenY); //相对于电脑屏幕的坐标
        })
        
        // 11 键盘常用事件 三个事件的执行顺序 keydown -> keypress -> keyup
        console.log('11 键盘常用事件')
        document.addEventListener('keydown', function (e) { // 键盘按下事件
            console.log(e);
            console.log(e.keyCode); // 获取按键的ASCII码
            console.log(e.key); // 获取按键的字符
            console.log(e.ctrlKey); // 获取ctrl键是否按下
            console.log(e.altKey); // 获取alt键是否按下
            console.log(e.shiftKey); // 获取shift键是否按下
        })
        document.addEventListener('keyup', function (e) { // 键盘抬起事件
            console.log(e.keyCode); // 获取按键的ASCII码
            console.log(e.key); // 获取按键的字符
            console.log(e.ctrlKey); // 获取ctrl键是否按下
            console.log(e.altKey); // 获取alt键是否按下
            console.log(e.shiftKey); // 获取shift键是否按下
        })
        document.addEventListener('keypress', function (e) { // 键盘按下 但是不识别功能键如 ctrl shift 箭头等
            console.log(e.keyCode); // 获取按键的ASCII码
            console.log(e.key); // 获取按键的字符
            console.log(e.ctrlKey); // 获取ctrl键是否按下
            console.log(e.altKey); // 获取alt键是否按下
            console.log(e.shiftKey); // 获取shift键是否按下
        })
        // onkeydown和onkeyup 不区分字母大小写，onkeypress区分字母大小写
        // 实际开发等多的使用keydown和keyup,它能识别所有的键（包括功能键）
        // onkeypress不识别功能键，但是能区分字母大小写 返回不同的ASCII码

        // keydown和keypress在文本框里面的特点：他们两个事件触发的时候，文字还没有落入文本框中。
        // keyup事件触发的时候，文字已经落入文本框中。
    </script>
</body>

</html>
