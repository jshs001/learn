<!-- 
pc屏幕分辨率分为：
    物理分辨率：屏幕分辨率的物理大小，出厂实际分辨率
    逻辑分辨率：屏幕分辨率的逻辑大小，pc右键显示设置的分辨率设置再除以放大倍数 -->

<!-- 手机屏幕分辨率也分物理分辨率和逻辑分辨率，常见比例关系有2:1,2.6:1,3:1. -->

<!-- 我们写代码是参考的逻辑分辨率 -->

<!-- 移动端设计师参考物理分辨率750*1334(iPhone 678),也就是说设计师会出二倍图 -->
