<!-- 一行配置 -->
<!-- 
/*1. 先强制一行内显示文本*/
white-space: nowrap;  （ 默认 normal 自动换行）
/*2. 超出的部分隐藏*/
overflow: hidden;
/*3. 文字用省略号替代超出的部分*/
text-overflow: ellipsis; 
-->

<!-- 多行配置 -->
<!-- 
/*1. 超出的部分隐藏 */
overflow: hidden;
/*2. 文字用省略号替代超出的部分 */
text-overflow: ellipsis;
/* 3. 弹性伸缩盒子模型显示 */
display: -webkit-box;
/* 4. 限制在一个块元素显示的文本的行数 */
-webkit-line-clamp: 2;
/* 5. 设置或检索伸缩盒对象的子元素的排列方式 */
-webkit-box-orient: vertical; 
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>‘
    <style>
        .f1 {
            width: 150px;
            height: 80px;
            background-color: pink;
            margin: 100px auto;
            /* 这个单词的意思是，如果文字显示不开，自动换行 */
            /* white-space: normal; */
            /* 1. 这个单词的意思是，如果文字显示不开，也必须强制在一行显示 */
            white-space: nowrap;
            /* 2. 溢出的部分隐藏起来 */
            overflow: hidden;
            /* 3. 文字溢出的时候用省略号来显示 */
            text-overflow: ellipsis;
        }
        
        .f2 {
            width: 150px;
            height: 40px;
            background-color: pink;
            margin: 100px auto;
            /*1. 超出的部分隐藏 */
            overflow: hidden;

            /*2. 文字用省略号替代超出的部分 */
            text-overflow: ellipsis;

            /* 3. 弹性伸缩盒子模型显示 */
            display: -webkit-box;

            /* 4. 限制在一个块元素显示的文本的行数 */
            -webkit-line-clamp: 2;

            /* 5. 设置或检索伸缩盒对象的子元素的排列方式 */
            -webkit-box-orient: vertical;
        }
    </style>
</head>

<body>
    <div class="f1">此处省略一万字哈哈哈哈哈哈哈哈哈哈哈哈哈哈</div>
    <div class="f2">此处省略一万字哈哈哈哈哈哈哈哈哈哈哈哈哈哈hhh</div>
</body>

</html>
