    <div id="a"></div>    
    <div id="b"></div>

    <script>
        //1 dom 对象：用原生js获取的对象
        var mydiv = document.querySelector('#a');
        console.log(mydiv);

        //2 jquery对象：用jquery获取的对象
        var mydiv1 = $('#b');
        console.log(mydiv1);

        //3 dom对象只能使用dom对象的方法，jquery对象只能使用jquery对象方法
        mydiv.style.backgroundColor = 'rgb(73, 6, 6)';
        // mydiv.hide(); // dom对象不可以用hide()方法
        // mydiv1.style.backgroundColor = 'rgb(73, 6, 6)'; // jquery对象不能用style属性
        mydiv1.css('background-color', 'rgb(8, 6, 6)');

        //4 dom对象转换为jquery对象
        var mydiv2 = $(mydiv);
        mydiv2.css('color', 'white');
        mydiv2.html('dom对象转换为jquery对象');
        console.log(mydiv2);

        var mydiv3 = mydiv1[0];
        var mydiv3 = mydiv1.get(0);
        mydiv3.style.color = 'white';
        mydiv3.innerHTML = 'jquery对象转换为dom对象';

    </script>

</body>
