<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../lib/bootstrap-3.4.1-dist/css/bootstrap.min.css">

    <style>
    </style>
</head>

<body>
    <!-- 组件 下拉菜单 下拉点不了是因为没有js-->
    <div class="dropdown">
        <button class="btn btn-default dropdown-toggle" type="button" id="dropdownMenu1" data-toggle="dropdown"
            aria-haspopup="true" aria-expanded="true">
            下拉
            <span class="caret"></span>
        </button>
        <ul class="dropdown-menu" aria-labelledby="dropdownMenu1">
            <li><a href="#">Action</a></li>
            <li><a href="#">Another action</a></li>
            <li><a href="#">Something else here</a></li>
            <li role="separator" class="divider"></li>
            <li><a href="#">Separated link</a></li>
        </ul>
    </div>

    <!-- 组件 路径导航 -->
    <ol class="breadcrumb">
        <li><a href="#">Home</a></li>
        <li><a href="#">Library</a></li>
        <li class="active">Data</li>
    </ol>

    <!-- 字体图标 -->
    <i class="glyphicon glyphicon-pencil"></i>

    <!-- 插件 下拉菜单 -->
    <div class="dropdown">
        <button id="dLabel" type="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
            Dropdown trigger
            <span class="caret"></span>
        </button>
        <ul class="dropdown-menu" aria-labelledby="dLabel">
            <li>111</li>
            <li>222</li>
            <li>333</li>
        </ul>
    </div>

     <!-- 插件 轮播图 -->
    <div id="carousel-example-generic" class="carousel slide" data-ride="carousel">
        <!-- Indicators -->
        <ol class="carousel-indicators">
            <li data-target="#carousel-example-generic" data-slide-to="0" class="active"></li>
            <li data-target="#carousel-example-generic" data-slide-to="1"></li>
            <!-- <li data-target="#carousel-example-generic" data-slide-to="2"></li> -->
        </ol>

        <!-- Wrapper for slides -->
        <div class="carousel-inner" role="listbox">
            <div class="item active">
                <img src="../1 html/img/11.png" alt="...">
                <div class="carousel-caption">
                    ...
                </div>
            </div>
            <div class="item">
                <img src="../1 html/img/11.png" alt="...">
                <div class="carousel-caption">
                    ...
                </div>
            </div>
            ...
        </div>

        <!-- Controls -->
        <a class="left carousel-control" href="#carousel-example-generic" role="button" data-slide="prev">
            <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
            <span class="sr-only">Previous</span>
        </a>
        <a class="right carousel-control" href="#carousel-example-generic" role="button" data-slide="next">
            <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
            <span class="sr-only">Next</span>
        </a>
    </div>
    <script src="../lib/jquery-3.7.1.js"></script>
    <script src="../lib/bootstrap-3.4.1-dist/js/bootstrap.min.js"></script>


    <!-- 如果需要定制内容 则需要查询具体的组件、全局css样式、js插件的文档中的定制参数 再去定制页面搜索相关参数 修改后点击dowwnload 生成定制的框架
    然后点击编译并下载 在自己的项目中引用定制的项目文件即可-->

    <!-- 电商站点 很少做响应式 如京东 因为内容太多 电商站大多做pc端网站和移动端app或网站 -->
    <!-- 类似http://alloyteam.com/ 基本全部元素都响应式了 是因为内容过少 所以基本元素都响应式了 -->

    <!-- 另外全局css样式中 可以注意一下辅助类中的快速浮动、清除浮动和响应式工具 -->
</body>

</html>
