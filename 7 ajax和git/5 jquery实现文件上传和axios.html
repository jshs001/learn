    <script>
        // axios 专注于网络数据请求的库，基于promise。相比于jquery的ajax，axios更轻量化；相比原生xmr，axios更简单易用。
        // axios.get(url, {params: {/*参数*/}}).then(callback)
        // axios.post(url, {/*参数*/}).then(callback))

        $(function () {
            $("#btn1").on("click", function () {
                // axios发起get请求： 
                var url = "http://jsonplaceholder.typicode.com/posts";
                var paramsObj = {
                    userId: 1, id: 1
                }
                axios.get(url, {
                    params: paramsObj
                }).then(function (res) {
                    console.log(res.data);   // res.data为请求返回的数据 data上层是axios包裹和定义的一些属性
                })

            })
            $("#btn2").on("click", function () {
                // axios发起post请求： 
                var url = "http://jsonplaceholder.typicode.com/posts";
                var dataObj = {
                    title: "foo",
                    body: "bar",
                    userId: 1
                }
                axios.post(url, dataObj).then(function (res) {
                    console.log(res.data);   // res.data为请求返回的数据
                })
            })

            // axios函数语法
            // axios({
            //     method: '请求类型',
            //     url: '请求地址',
            //     params: { get请求参数 },
            //     data: { post请求数据 }
            // }).then(callback)
            $("#btn3").on("click", function () {
                var url = "http://jsonplaceholder.typicode.com/posts";
                var paramsObj = {
                    userId: 1, id: 1
                }
                axios({
                    method: "get",
                    url: url,
                    params: paramsObj
                }).then(function (res) {
                    console.log(res.data);   // res.data为请求返回的数据
                })
            })
            $("#btn4").on("click", function () {
                var url = "http://jsonplaceholder.typicode.com/posts";
                var dataObj = {
                    title: "foo",
                    body: "bar",
                    userId: 1
                }
                axios({
                    method: "post",
                    url: url,
                    data: dataObj
                }).then(function (res) {
                    console.log(res.data);   // res.data为请求返回的数据
                })
            })
        })
    </script>

    <button id="btn1">发起get请求</button><button id="btn2">发起post请求</button>
    <br></br>
    <button id="btn3">axios函数发起get请求</button><button id="btn4">axios函数发起post请求</button>
</body>
