        // 2.2 formdata对象管理表单数据
        $(function () {
            var form1 = document.getElementById('form1')

            form1.addEventListener('submit', function (e) {
                e.preventDefault() // 阻止表单的默认提交行为

                var fd = new FormData(form1) // 创建formdata对象 快速获取表单数据
                var xhr = new XMLHttpRequest()
                xhr.open('post', 'http://jsonplaceholder.typicode.com/posts')
                xhr.send(fd)

                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4 && xhr.status === 201) {
                        console.log(JSON.parse(xhr.responseText))
                    }
                }

            })

            // 3 上传文件 
            // 如下代码是一个演示函数 我没有后端文件服务器 这里演示单个文件上传 多个文件上传得改代码
            var btn1 = $('#btn1')
            // var file1s = $('#file1')[0].files //这里写会有问题 页面加载完成后只执行一次
            var img1 = $('#img1')

            btn1.on('click', function () {
                var file1s = $('#file1')[0].files //需要写在这里 因为用户是加载后的时间段执行操作
                if (file1s.length <= 0) {
                    return alert('请选择需要上传的文件')
                }

                var fd = new FormData()
                fd.append('avatar', file1s[0])

                var xhr = new XMLHttpRequest()

                // 4 文件上传
                // 4.1 监听上传进度信息 upload.onprogress
                xhr.upload.onprogress = function (e) { // 上传进度信息对象e 有三个重要属性
                    if (e.lengthComputable) { //e.lengthComputable 布尔值 表示当前上传的资源是否具有可计算的长度
                        var percentComplete = Math.cell(e.loaded / e.total * 100) // e.loaded 已上传的字节数 e.total 需上传的总字节数
                        console.log(percentComplete)
                        $('#percnet').attr('style', 'width:' + percentComplete + '%').html(percentComplete + '%') // 设置进度条样式
                    }
                }
                // 4.2 监听上传完成事件 upload.onload
                xhr.upload.onload = function () { // 上传完成事件
                    $('#percnet').removeClass().addClass('progress-bar progress-bar-success')
                }


                xhr.open('post', 'http://jsonplaceholder.typicode.com/posts')
                xhr.send(fd)

                xhr.onreadystatechange = function () {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        var data = JSON.parse(xhr.responseText)
                        if (data.status === 200) { // 上传成功
                            img1.attr('src', 'http://jsonplaceholder.typicode.com/posts' + data.url)
                        } else { // 上传失败
                            console.log('data.message')
                        }
                    }
                }

            })

            //     并发控制： 对于多文件上传，可以通过控制并发请求数，避免浏览器瞬间发起过多请求导致页面卡顿。具体实现可参考掘金前端多文件上传并发控制文章。
