    <script>
        // 同源和跨域
        // 同源：协议、域名、端口号相同
        // 跨域：协议、域名、端口号不同

        // 跨域问题：
        // 1. 同源策略：同源策略是浏览器的安全策略，是浏览器对ajax请求的默认限制。同源策略限制了不同源的脚本不能进行ajax请求。
        //             通俗的理解：a网站的js文件不能请求非同源的b网站的数据。
        //                        无法读取非同源b网站的Cookie、localStorage、indexDB数据
        //                        无法解除非同源网页的DOM
        //                        无法向非同源地址发送ajax请求

        // 2. 浏览器对跨域请求的拦截
        //    跨域请求可以正常发起，浏览器能正常接收到跨域响应的数据，浏览器会根据同源策略进行拦截，不会把数据给到ajax。

        // 3. 如何实现跨域数据请求，最主要的两种解决方案，分别是 JSONP 和 CORS。
        //    JSONP： 出现的早，兼容性好（兼容低版本IE）。是前端程序员为了解决跨域问题，被迫想出来的一种临时解决方案。缺点是只支持 GET 请求，不支持 POST 请求。
        //    CORS： 出现的较晚，它是 W3C 标准，属于跨域 Ajax 请求的根本解决方案。支持 GET 和 POST 请求。缺点是不兼容某些低版本的浏览器

        // 4. JSONP的实现原理
        //    由于浏览器同源策略的限制，网页中无法通过 Ajax 请求非同源的接口数据。但是 <script> 标签不受浏览器同源策略的影响，可以通过 src 属性，请求非同源的 js 脚本。
        //    JSONP 的实现原理，就是通过 <script> 标签的 src 属性，请求跨域的数据接口，并通过函数调用的形式，接收跨域接口响应回来的数据。

        // })

    <!-- 节流的应用场景
    ① 鼠标连续不断地触发某事件（如点击），只在单位时间内只触发一次；
    ② 懒加载时要监听计算滚动条的位置，但不必每次滑动都触发，可以降低计算的频率，而不必去浪费 CPU 资源； -->

    <!-- 总结防抖和节流的区别
    防抖：如果事件被频繁触发，防抖能保证只有最有一次触发生效！前面 N 多次的触发都会被忽略！
    节流：如果事件被频繁触发，节流能够减少事件触发的频率，因此，节流是有选择性地执行一部分事件！ -->
