<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 通信，就是信息的传递和交换。
        // 通信三要素：通信的主体、通信的内容、通信的方式
        // 通信协议（Communication Protocol）是指通信的双方完成通信所必须遵守的规则和约定。
        // 通俗的理解：通信双方采用约定好的格式来发送和接收消息，这种事先约定好的通信格式，就叫做通信协议。

        // 互联网中的通信协议
        // 客户端与服务器之间要实现网页内容的传输，则通信的双方必须遵守网页内容的传输协议。
        // 网页内容又叫做超文本，因此网页内容的传输协议又叫做超文本传输协议（HyperText Transfer Protocol） ，简称 HTTP 协议。

        // HTTP 协议即超文本传送协议 (HyperText Transfer Protocol) ，它规定了客户端与服务器之间进行网页内容传输时，所必须遵守的传输格式。
        // 例如：
        // 客户端要以HTTP协议要求的格式把数据提交到服务器
        // 服务器要以HTTP协议要求的格式把内容响应给客户端

        // HTTP 协议采用了 请求/响应 的交互模型。

        // HTTP请求消息
        // 由于 HTTP 协议属于客户端浏览器和服务器之间的通信协议。因此，客户端发起的请求叫做 HTTP 请求，客户
        // 端发送到服务器的消息，叫做 HTTP 请求消息。
        // 注意：HTTP 请求消息又叫做 HTTP 请求报文

        // HTTP请求消息的组成部分
        // HTTP 请求消息由请求行（request line）、请求头部（ header ） 、空行 和 请求体 4 个部分组成。

        // 请求行
        // 请求行由请求方式、URL 和 HTTP 协议版本 3 个部分组成，他们之间使用空格隔开。 googlel浏览器network面板中随便点开一个请求，查看headers部分第一行。

        // 请求头部
        // 请求头部用来描述客户端的基本信息，从而把客户端相关的信息告知服务器。比如：User-Agent  用来说明当前是什么类型的浏览器；
        // Content-Type 用来描述发送到服务器的数据格式；Accept 用来描述客户端能够接收什么类型的返回内容；Accept-Language 用来描述客户端期望接收哪种人类语言的文本内容。
        // 请求头部由多行键/值对组成，每行的键和值之间用英文的冒号分隔

        // 常见的请求头部
        // host ：请求的域名
        // connection ：请求的连接方式(close或keep-alive)
        // content-length ：请求体的大小
        // accept ：客户端可识别的响应内容类型列表
        // User-Agent ：客户端浏览器信息
        // content-type ：请求体的内容类型
        // accept-encoding ：客户端可识别的压缩编码类型
        // accept-language ：客户端可识别的语言类型
        // 关于更多请求头字段的描述，可以查看 MDN 官方文档：https://developer.mozilla.org/zh-CN/docs/Web/HTTP/Headers

        // 空行
        // 最后一个请求头字段的后面是一个空行，通知服务器请求头部至此结束。
        // 请求消息中的空行，用来分隔请求头部与请求体

        // 请求体
        // 请求体中存放的，是要通过 POST 方式提交到服务器的数据。
        // 注意：只有 POST 请求才有请求体，GET 请求没有请求体！

        // google浏览器中network面板中 看一个请求的header部分 然后点击view source 就是原始的请求消息

        // HTTP响应消息
        // 响应消息就是服务器响应给客户端的消息内容，也叫作响应报文。

        // HTTP响应消息的组成部分
        // HTTP响应消息由状态行、响应头部、空行 和 响应体 4 个部分组成

        // 状态行
        // 状态行由 HTTP 协议版本、状态码和状态码的描述文本 3 个部分组成，他们之间使用空格隔开 

        // 响应头部
        // 响应头部用来描述服务器的基本信息。响应头部由多行 键/值对 组成，每行的键和值之间用英文的冒号分隔。
        // 常见响应头部
        // X-Powered-By: Express  服务器名称和版本
        // Access-Control-Allow-Origin: *  允许跨域访问
        // Content-Type: text/html; charset=utf-8  响应内容类型和编码
        // Content-Length: 1234  响应内容长度
        // ETag: W/"44-nT/y6yOFj7H40EVW1DWB1MG+Pq0" 响应内容MD5
        // Date: Fri, 09 Sep 2016 05:09:05 GMT  响应的时间
        // Connection: keep-alive  连接类型
        // 关于更多响应头字段的描述，可以查看 MDN 官方文档：https://developer.mozilla.org/zh-CN/docs/Web/HTTP/Headers

        // 空行
        // 在最后一个响应头部字段结束之后，会紧跟一个空行，用来通知客户端响应头部至此结束。
        // 响应消息中的空行，用来分隔响应头部与响应体。

        // 响应体
        // 响应体中存放的，是服务器响应给客户端的资源内容。
        // google浏览器f12 network面板 随便打开一个请求 response面板

        // HTTP 请求方法，属于 HTTP 协议中的一部分，请求方法的作用是：用来表明要对服务器上的资源执行的操作。最常用的请求方法是 GET 和 POST。
        // HTTP 请求方法9个（前4个常用）:
        // GET：请求指定的页面信息，并返回实体主体。
        // POST：提交用于创建新的资源的请求。
        // PUT：提交用于更新资源的请求。
        // DELETE：删除指定的页面。
        // HEAD：请求获取的网页的响应，与 GET 方法一样，但是不返回网页内容。
        // OPTIONS：允许客户端查看服务器支持的 HTTP 请求方法。
        // CONNECT:建立一个到由目标资源标识的服务器的隧道。
        // TRACE：回显服务器收到的请求，主要用于测试或检查，不能作为生产环境使用的方法。
        // PATCH：是对PUT方法的补充，用来对已知资源进行局部更新。

        // HTTP 响应状态码（HTTP Status Code），也属于 HTTP 协议的一部分，用来标识响应的状态。
        // 响应状态码会随着响应消息一起被发送至客户端浏览器，浏览器根据服务器返回的响应状态码，就能知道这次
        // HTTP 请求的结果是成功还是失败了。

        // HTTP响应状态码的组成及分类
        // HTTP 状态码由三个十进制数字组成，第一个十进制数字定义了状态码的类型，后两个数字用来对状态码进行细分。
        // HTTP 状态码共分为 5 种类型：        
        // 1. 1xx：信息，服务器收到请求，需要请求者继续执行操作。
        // 2. 2xx：成功，服务器成功处理了请求。
        // 3. 3xx：重定向，需要请求者进行重新请求。
        // 4. 4xx：客户端错误，请求包含语法错误或无法完成请求。
        // 5. 5xx：服务器错误，服务器在处理请求时发生了错误。
        // 完整的 HTTP 响应状态码，可以参考 MDN 官方文档 https://developer.mozilla.org/zh-CN/docs/Web/HTTP/Status

        // 常见的HTTP响应状态码
        // 2** 成功相关的响应状态码
        // 2** 范围的状态码，表示服务器已成功接收到请求并进行处理。常见的 2** 类型的状态码如下：
        // 200 OK  请求成功。一般用于 POST 和 PUT 请求。
        // 201 Created  请求成功并创建了新的资源。通常用于 POST 或 PUT 请求。

        // 3** 重定向相关的响应状态码
        // 3** 范围的状态码，表示表示服务器要求客户端重定向，需要客户端进一步的操作以完成资源的请求。常见的 3** 类型的状态码如下：
        // 301 Moved Permanently  永久移动。请求的资源已被永久移动到新URI，返回信息中包含新的URI，用户浏览器需要使用新的URI进行访问。今后的请求应该使用新的URI来代替。
        // 302 Found  临时移动。与301类似，但资源只是临时移动。客户端需要使用原有的URI来再次请求资源。
        // 304 Not Modified  未修改。所请求的资源未修改，服务器返回此状态码时，不会返回任何资源（响应消息中不包含响应体）。客户端通常会缓存访问过的资源。

        // 4** 客户端错误相关的响应状态码
        // 4** 范围的状态码，表示客户端的请求有非法内容，从而导致这次请求失败。常见的 4** 类型的状态码如下：
        // 400 Bad Request ：请求的语法错误，服务器无法理解。除非修改请求，否则无法成功。请求参数错误。
        // 401 Unauthorized ：请求要求用户的身份认证。
        // 403 Forbidden ：服务器理解请求客户端的请求，但是拒绝执行此请求。
        // 404 Not Found ：服务器无法根据客户端的请求找到资源（网页）。
        // 408 Request Timeout ：请求超时。服务器等待客户端发送的请求时间过长，超时。

        // 5** 服务端错误相关的响应状态码
        // 5** 范围的状态码，表示服务器未能正常处理客户端的请求而出现意外错误。常见的 5** 类型的状态码如下
        // 500 Internal Server Error ：服务器内部错误，无法完成客户端的请求。
        // 501 Not Implemented ：服务器不支持客户端的请求方法。只有GET 和 HEAD 请求方法是要求每个服务器必须支持的。其他的请求方法在不支持的服务器上会返回501。
        // 503 Service Unavailable ：又要超载或系统维护，服务器暂时无法处理客户端的请求。
       

    </script>
</body>
</html>
